<script>
    const content = [
        { id: 'item1', text: 'Ask the partner if they used violence.', type: 'harmful' },
        { id: 'item2', text: 'Believe them. Do not investigate.', type: 'helpful' },
        { id: 'item3', text: 'Suggest couples counselling.', type: 'harmful' },
        { id: 'item4', text: 'Tell them it is not their fault.', type: 'helpful' },
        { id: 'item5', text: 'Respect their choice to stay or leave.', type: 'helpful' }
    ];

    let results = { helpful: [], harmful: [] };

    // --- PC DRAG LOGIC ---
    function allowDrop(ev) { ev.preventDefault(); }
    function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
    function drop(ev) {
        ev.preventDefault();
        const id = ev.dataTransfer.getData("text");
        const el = document.getElementById(id);
        const targetZone = ev.target.closest('.zone') || ev.target.closest('.source-container');
        if (targetZone) targetZone.appendChild(el);
    }

    function checkAnswers() {
        const items = document.querySelectorAll('.draggable');
        let correct = 0;
        results = { helpful: [], harmful: [] }; 
        items.forEach(item => {
            const parent = item.parentElement.id;
            const type = item.dataset.type;
            if ((type === 'helpful' && parent === 'helpful-zone') || (type === 'harmful' && parent === 'harmful-zone')) {
                item.style.border = "1px solid var(--correct)";
                correct++;
            } else {
                item.style.border = "1px solid var(--incorrect)";
            }
            if(parent !== 'source-zone') {
                const finalCat = parent === 'helpful-zone' ? 'helpful' : 'harmful';
                results[finalCat].push(item.innerText);
            }
        });
        if(correct === 5) showSummary();
        else document.getElementById('feedback-area').innerText = `Sorted correctly: ${correct}/5`;
    }

    // --- MOBILE SWIPE LOGIC (Enhanced with Validation) ---
    let swipedCount = 0;
    function initMobile() {
        const stack = document.getElementById('card-stack');
        stack.innerHTML = ''; // Clear existing
        content.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'swipe-card';
            card.innerText = item.text;
            card.style.zIndex = content.length - i;
            card.style.transition = 'transform 0.3s ease, background-color 0.2s ease';
            handleSwipe(card, item);
            stack.appendChild(card);
        });
    }

    function handleSwipe(el, itemData) {
        let startX = 0, moveX = 0;

        el.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            el.style.transition = 'none'; // Disable transition while dragging
        });

        el.addEventListener('touchmove', e => {
            moveX = e.touches[0].clientX - startX;
            const rotation = moveX / 15;
            el.style.transform = `translateX(${moveX}px) rotate(${rotation}deg)`;

            // Visual Feedback while sliding
            if (moveX > 40) {
                el.style.backgroundColor = '#e8f5e9'; // Light Green tint
                el.style.borderColor = 'var(--correct)';
            } else if (moveX < -40) {
                el.style.backgroundColor = '#ffebee'; // Light Red tint
                el.style.borderColor = 'var(--incorrect)';
            } else {
                el.style.backgroundColor = 'white';
                el.style.borderColor = 'var(--primary-light)';
            }
        });

        el.addEventListener('touchend', () => {
            el.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s ease';
            
            if (Math.abs(moveX) > 100) { 
                const choice = moveX > 0 ? 'helpful' : 'harmful';
                
                // VALIDATION CHECK
                if (choice === itemData.type) {
                    // Correct Swipe
                    el.style.backgroundColor = 'var(--correct)';
                    el.style.color = 'white';
                    el.style.transform = `translateX(${moveX > 0 ? 800 : -800}px) rotate(${moveX / 5}deg)`;
                    
                    results[choice].push(itemData.text);
                    swipedCount++;
                    
                    if(swipedCount === content.length) setTimeout(showSummary, 500);
                } else {
                    // Incorrect Swipe - Reject and Snap Back
                    el.style.backgroundColor = 'var(--incorrect)';
                    setTimeout(() => {
                        el.style.transform = 'translateX(0) rotate(0)';
                        el.style.backgroundColor = 'white';
                        el.style.color = 'var(--text-color)';
                    }, 200);
                }
            } else {
                // Not swiped far enough
                el.style.transform = 'translateX(0) rotate(0)';
                el.style.backgroundColor = 'white';
            }
            moveX = 0;
        });
    }

    function showSummary() {
        document.querySelector('.game-container').style.display = 'none';
        document.getElementById('mobile-swipe-root').style.display = 'none';
        document.querySelector('.controls').style.display = 'none';
        document.getElementById('main-instr').style.display = 'none';
        
        document.getElementById('summary-view').style.display = 'block';
        document.getElementById('sum-helpful').innerHTML = results.helpful.map(t => `<li class="help-text">✓ ${t}</li>`).join('');
        document.getElementById('sum-harmful').innerHTML = results.harmful.map(t => `<li class="harm-text">✕ ${t}</li>`).join('');
    }

    if (window.innerWidth <= 768) initMobile();
</script>
